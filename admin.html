<!DOCTYPE html>
<html lang="en">
<head>
	<title>CMS Admin - Muhammad Azhar</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="assets/css/main.css">
	<script src="https://cdn.jsdelivr.net/npm/vue@2.7.13"></script>
	<style>
		.admin-container { max-width: 800px; margin: 0 auto; padding: 2rem; }
		.admin-section { margin-bottom: 3rem; }
		.form-group { margin-bottom: 1rem; }
		.form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
		.form-group input, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
		.form-group textarea { min-height: 100px; }
		.tech-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
		.tech-tag { background: #f0f0f0; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.875rem; }
		.btn { padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
		.btn-primary { background: #8B4513; color: white; }
		.btn-secondary { background: #666; color: white; }
		.content-list { margin-top: 2rem; }
		.content-item { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
		.content-item h4 { margin-top: 0; }
		.content-actions { margin-top: 1rem; }
		.tabs { display: flex; margin-bottom: 2rem; }
		.tab { padding: 1rem; cursor: pointer; border-bottom: 2px solid transparent; }
		.tab.active { border-bottom-color: #8B4513; font-weight: 500; }
	</style>
</head>
<body>
	<div id="admin-app" class="admin-container">
		<h1>CMS Admin Panel</h1>

		<div class="tabs">
			<div class="tab" :class="{ active: activeTab === 'projects' }" @click="activeTab = 'projects'">Projects</div>
			<div class="tab" :class="{ active: activeTab === 'writing' }" @click="activeTab = 'writing'">Writing</div>
		</div>

		<!-- Projects Tab -->
		<div v-if="activeTab === 'projects'" class="admin-section">
			<h2>Manage Projects</h2>

			<!-- Add New Project Form -->
			<div class="content-item">
				<h3>Add New Project</h3>
				<form @submit.prevent="addProject">
					<div class="form-group">
						<label>Title</label>
						<input v-model="newProject.title" required>
					</div>
					<div class="form-group">
						<label>Description</label>
						<textarea v-model="newProject.description" required></textarea>
					</div>
					<div class="form-group">
						<label>Technologies (comma-separated)</label>
						<input v-model="newProject.techString" placeholder="Tableau, SQL, Python">
					</div>
					<div class="form-group">
						<label>Case Study Link</label>
						<input v-model="newProject.link" placeholder="https://...">
					</div>
					<button type="submit" class="btn btn-primary">Add Project</button>
				</form>
			</div>

			<!-- Existing Projects -->
			<div class="content-list">
				<h3>Existing Projects</h3>
				<div class="content-item" v-for="project in projects" :key="project.id">
					<h4>{{ project.title }}</h4>
					<p>{{ project.description }}</p>
					<div class="tech-tags">
						<span class="tech-tag" v-for="tech in project.technologies" :key="tech">{{ tech }}</span>
					</div>
					<div class="content-actions">
						<button class="btn btn-secondary" @click="editProject(project)">Edit</button>
						<button class="btn btn-secondary" @click="deleteProject(project)">Delete</button>
					</div>
				</div>
			</div>
		</div>

		<!-- Writing Tab -->
		<div v-if="activeTab === 'writing'" class="admin-section">
			<h2>Manage Writing</h2>

			<!-- Add New Post Form -->
			<div class="content-item">
				<h3>Add New Post</h3>
				<form @submit.prevent="addPost">
					<div class="form-group">
						<label>Title</label>
						<input v-model="newPost.title" required>
					</div>
					<div class="form-group">
						<label>Description</label>
						<textarea v-model="newPost.description" required></textarea>
					</div>
					<div class="form-group">
						<label>Link</label>
						<input v-model="newPost.link" placeholder="https://...">
					</div>
					<button type="submit" class="btn btn-primary">Add Post</button>
				</form>
			</div>

			<!-- Existing Posts -->
			<div class="content-list">
				<h3>Existing Posts</h3>
				<div class="content-item" v-for="post in writing" :key="post.id">
					<h4>{{ post.title }}</h4>
					<p>{{ post.description }}</p>
					<div class="content-actions">
						<button class="btn btn-secondary" @click="editPost(post)">Edit</button>
						<button class="btn btn-secondary" @click="deletePost(post)">Delete</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		new Vue({
			el: '#admin-app',
			data: {
				activeTab: 'projects',
				projects: [],
				writing: [],
				newProject: {
					title: '',
					description: '',
					techString: '',
					link: '#'
				},
				newPost: {
					title: '',
					description: '',
					link: '#'
				}
			},
			mounted() {
				this.loadProjects();
				this.loadWriting();
			},
			methods: {
				loadProjects() {
					fetch('data/projects.json')
						.then(response => response.json())
						.then(data => {
							this.projects = data;
						})
						.catch(error => console.error('Error loading projects:', error));
				},
				loadWriting() {
					fetch('data/writing.json')
						.then(response => response.json())
						.then(data => {
							this.writing = data;
						})
						.catch(error => console.error('Error loading writing:', error));
				},
				addProject() {
					const project = {
						id: this.generateId(),
						title: this.newProject.title,
						description: this.newProject.description,
						technologies: this.newProject.techString.split(',').map(t => t.trim()),
						link: this.newProject.link,
						featured: true
					};

					this.projects.push(project);
					this.saveProjects();

					// Reset form
					this.newProject = { title: '', description: '', techString: '', link: '#' };
				},
				addPost() {
					const post = {
						id: this.generateId(),
						title: this.newPost.title,
						description: this.newPost.description,
						link: this.newPost.link,
						published: new Date().toISOString().split('T')[0],
						featured: true
					};

					this.writing.push(post);
					this.saveWriting();

					// Reset form
					this.newPost = { title: '', description: '', link: '#' };
				},
				editProject(project) {
					// For now, just log. In a real CMS, this would open an edit form
					console.log('Edit project:', project);
				},
				deleteProject(project) {
					if (confirm('Are you sure you want to delete this project?')) {
						this.projects = this.projects.filter(p => p.id !== project.id);
						this.saveProjects();
					}
				},
				editPost(post) {
					console.log('Edit post:', post);
				},
				deletePost(post) {
					if (confirm('Are you sure you want to delete this post?')) {
						this.writing = this.writing.filter(p => p.id !== post.id);
						this.saveWriting();
					}
				},
				saveProjects() {
					// In a real implementation, this would save to the server
					console.log('Saving projects:', this.projects);
					localStorage.setItem('projects', JSON.stringify(this.projects));
				},
				saveWriting() {
					console.log('Saving writing:', this.writing);
					localStorage.setItem('writing', JSON.stringify(this.writing));
				},
				generateId() {
					return Date.now().toString(36) + Math.random().toString(36).substr(2);
				}
			}
		});
	</script>
</body>
</html>
